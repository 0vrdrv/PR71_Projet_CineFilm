<header class="flex items-center justify-between px-8 py-6 border-b border-gray-200 bg-white">

  <div class="flex items-center gap-10">
    <a routerLink="/"
      class="text-2xl font-black tracking-tighter text-gray-900 cursor-pointer hover:text-figma-yellow transition-colors">
      Letterboxd
    </a>

    <nav class="flex items-center space-x-6 text-xs font-bold tracking-widest uppercase pt-1">
      <ng-container *ngIf="!isLoggedIn">
        <a routerLink="/login"
          class="bg-figma-yellow px-4 py-2 rounded-md text-black cursor-pointer hover:scale-105 transition-transform shadow-sm">Sign
          In</a>
        <a routerLink="/register" class="hover:text-gray-900 text-gray-500 cursor-pointer transition-colors">Create
          Account</a>
      </ng-container>

      <ng-container *ngIf="isLoggedIn">
        <a routerLink="/profile" class="hover:text-gray-900 text-gray-500 cursor-pointer transition-colors">Profile</a>
        <a (click)="logout()" class="hover:text-red-500 text-gray-500 cursor-pointer transition-colors">Log Out</a>
      </ng-container>

      <a routerLink="/films" class="hover:text-gray-900 text-gray-500 cursor-pointer transition-colors">Films</a>
      <a routerLink="/lists" class="hover:text-gray-900 text-gray-500 cursor-pointer transition-colors">Lists</a>
      <a routerLink="/members" class="hover:text-gray-900 text-gray-500 cursor-pointer transition-colors">Members</a>
    </nav>
  </div>

  <div class="relative">
    <input type="text" [formControl]="searchControl" (blur)="closeSearch()"
      (focus)="searchControl.value ? showDropdown = true : null" placeholder="Search..."
      class="bg-figma-gray-light rounded-full px-4 py-2 text-sm outline-none focus:ring-2 focus:ring-figma-yellow w-56 text-gray-700">

    <svg class="w-4 h-4 absolute right-4 top-2.5 text-gray-400 pointer-events-none" fill="none" stroke="currentColor"
      viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
        d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
    </svg>

    <div *ngIf="showDropdown"
      class="absolute top-full mt-3 w-80 bg-white rounded-xl shadow-2xl border border-gray-100 overflow-hidden z-50 right-0">
      <div *ngFor="let movie of searchResults" (click)="goToMovie(movie.id)"
        class="flex items-center gap-4 p-3 hover:bg-gray-50 cursor-pointer border-b border-gray-50 last:border-0 transition-colors">

        <img *ngIf="movie.poster_path" [src]="'https://image.tmdb.org/t/p/w92' + movie.poster_path"
          class="w-10 h-14 object-cover rounded shadow-sm">
        <div *ngIf="!movie.poster_path" class="w-10 h-14 bg-gray-200 rounded flex-shrink-0"></div>

        <div class="flex-1 min-w-0">
          <h4 class="text-sm font-bold text-gray-900 truncate">{{ movie.title }}</h4>
          <span class="text-xs font-bold text-gray-400">{{ movie.release_date | date:'yyyy' }}</span>
        </div>

      </div>
    </div>
  </div>

</header>

<main class="max-w-6xl mx-auto p-8">
  <router-outlet></router-outlet>
</main>
