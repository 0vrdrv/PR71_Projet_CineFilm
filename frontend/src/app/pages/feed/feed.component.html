<div class="max-w-4xl mx-auto pt-8 pb-20">
  <h1 class="text-3xl font-black text-gray-900 mb-2">Activity Feed</h1>
  <p class="text-gray-500 text-sm font-bold tracking-widest uppercase mb-12 border-b border-gray-200 pb-4">
    Recent activity from people you follow
  </p>

  <div *ngIf="!isLoggedIn" class="text-center py-20 bg-gray-50 rounded-2xl border border-gray-200">
    <p class="text-gray-500 font-serif mb-4">Sign in to see activity from people you follow.</p>
    <a routerLink="/login" class="inline-block bg-black text-white font-bold text-xs tracking-widest uppercase px-6 py-3 rounded-xl">Sign In</a>
  </div>

  <div *ngIf="isLoggedIn && !loading && feedReviews.length === 0" class="text-center py-20 text-gray-400 text-sm font-bold uppercase tracking-widest">
    No activity yet. Start following members!
  </div>

  <div class="space-y-6">
    <div *ngFor="let review of feedReviews" class="bg-white border border-gray-100 rounded-xl p-6 shadow-sm flex gap-6 hover:shadow-md transition-shadow">
      <div class="w-16 h-24 bg-gray-200 rounded shrink-0 cursor-pointer overflow-hidden" [routerLink]="['/films', review.tmdb_id]">
        <img *ngIf="review.poster_path" [src]="'https://image.tmdb.org/t/p/w200' + review.poster_path" class="w-full h-full object-cover">
      </div>
      <div class="flex-1">
        <h3 class="text-lg font-black text-gray-900 cursor-pointer hover:text-figma-yellow transition-colors" [routerLink]="['/films', review.tmdb_id]">
          {{ review.movie_title }}
        </h3>
        <div class="flex text-figma-yellow my-2">
          <svg *ngFor="let s of [1,2,3,4,5]" class="w-4 h-4" [class.text-gray-200]="s > review.rating" fill="currentColor" viewBox="0 0 24 24">
            <path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/>
          </svg>
        </div>
        <p *ngIf="review.comment" class="text-sm text-gray-600 font-serif leading-relaxed">"{{ review.comment }}"</p>
      </div>
    </div>
  </div>
</div>
