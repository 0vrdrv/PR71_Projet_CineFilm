<div class="flex flex-col md:flex-row gap-8">

    <aside class="w-full md:w-1/4">
        <div class="card p-6 sticky top-24">
            <h2 class="text-sm font-bold text-surface-900 dark:text-white mb-4 border-b border-surface-200 dark:border-surface-700 pb-2">Filters & Sort</h2>

            <div class="mb-4">
                <label class="block text-xs font-bold tracking-widest uppercase text-surface-400 dark:text-surface-500 mb-2">Sort By</label>
                <select [(ngModel)]="selectedSort" (change)="onFilterChange()"
                    class="input-base w-full !py-2 text-sm">
                    <option *ngFor="let option of sortOptions" [value]="option.value">{{ option.label }}</option>
                </select>
            </div>

            <div class="mb-4">
                <label class="block text-xs font-bold tracking-widest uppercase text-surface-400 dark:text-surface-500 mb-2">Genre</label>
                <select [(ngModel)]="selectedGenre" (change)="onFilterChange()"
                    class="input-base w-full !py-2 text-sm">
                    <option value="">All Genres</option>
                    <option *ngFor="let genre of genres" [value]="genre.id">{{ genre.name }}</option>
                </select>
            </div>

            <div class="mb-6">
                <label class="block text-xs font-bold tracking-widest uppercase text-surface-400 dark:text-surface-500 mb-2">Release Year</label>
                <input type="number" [(ngModel)]="selectedYear" (change)="onFilterChange()" placeholder="e.g. 2024"
                    class="input-base w-full !py-2 text-sm">
            </div>

            <button (click)="selectedGenre=''; selectedYear=''; selectedSort='popularity.desc'; onFilterChange()"
                class="btn-ghost w-full text-center">
                Clear Filters
            </button>
        </div>
    </aside>

    <section class="w-full md:w-3/4">
        <!-- Header with count and view toggle -->
        <div class="flex items-center justify-between mb-6">
            <p *ngIf="totalResults > 0" class="text-sm text-surface-500 dark:text-surface-400">
                <span class="font-bold text-surface-900 dark:text-white">{{ totalResults | number }}</span> films found
            </p>
            <div class="flex gap-1">
                <button (click)="viewMode = 'grid'"
                    class="p-2 rounded-lg transition-colors"
                    [class.bg-surface-100]="viewMode === 'grid'" [class.dark:bg-surface-800]="viewMode === 'grid'"
                    [class.text-surface-900]="viewMode === 'grid'" [class.dark:text-white]="viewMode === 'grid'"
                    [class.text-surface-400]="viewMode !== 'grid'">
                    <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20">
                        <path d="M5 3a2 2 0 00-2 2v2a2 2 0 002 2h2a2 2 0 002-2V5a2 2 0 00-2-2H5zM5 11a2 2 0 00-2 2v2a2 2 0 002 2h2a2 2 0 002-2v-2a2 2 0 00-2-2H5zM11 5a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V5zM11 13a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"/>
                    </svg>
                </button>
                <button (click)="viewMode = 'list'"
                    class="p-2 rounded-lg transition-colors"
                    [class.bg-surface-100]="viewMode === 'list'" [class.dark:bg-surface-800]="viewMode === 'list'"
                    [class.text-surface-900]="viewMode === 'list'" [class.dark:text-white]="viewMode === 'list'"
                    [class.text-surface-400]="viewMode !== 'list'">
                    <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20">
                        <path fill-rule="evenodd" d="M3 5a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zM3 10a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zM3 15a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1z" clip-rule="evenodd"/>
                    </svg>
                </button>
            </div>
        </div>

        <!-- Loading -->
        <div *ngIf="loading" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-4">
            <app-skeleton *ngFor="let i of [1,2,3,4,5,6,7,8]" type="card"></app-skeleton>
        </div>

        <!-- Grid View -->
        <div *ngIf="!loading && viewMode === 'grid'" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-4">
            <div *ngFor="let movie of movies" [routerLink]="['/films', movie.id]"
                class="poster-card aspect-[2/3] rounded-xl overflow-hidden relative cursor-pointer group shadow-poster poster-placeholder">
                <span class="z-0 absolute inset-0 flex items-center justify-center p-2 text-center">{{ movie.title }}</span>
                <img *ngIf="movie.poster_path" [src]="'https://image.tmdb.org/t/p/w342' + movie.poster_path"
                    [alt]="movie.title" loading="lazy" (error)="movie.poster_path = ''"
                    class="w-full h-full object-cover relative z-[1]">
                <div class="absolute inset-0 bg-gradient-to-t from-black/80 via-black/30 to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-300 flex flex-col items-center justify-end p-4 z-[2]">
                    <span class="text-white font-bold text-sm text-center mb-2">{{ movie.title }}</span>
                    <span class="bg-brand-400 text-surface-900 text-xs font-bold px-2 py-1 rounded">{{ movie.vote_average | number:'1.1-1' }}</span>
                </div>
            </div>
        </div>

        <!-- List View -->
        <div *ngIf="!loading && viewMode === 'list'" class="space-y-3">
            <div *ngFor="let movie of movies" [routerLink]="['/films', movie.id]"
                class="card p-4 flex gap-4 cursor-pointer hover:border-brand-400 group">
                <div class="w-16 h-24 rounded-lg overflow-hidden shrink-0 poster-placeholder relative">
                    <span class="z-0 absolute inset-0 flex items-center justify-center p-1 text-center text-[10px]">{{ movie.title }}</span>
                    <img *ngIf="movie.poster_path" [src]="'https://image.tmdb.org/t/p/w92' + movie.poster_path"
                        loading="lazy" (error)="movie.poster_path = ''"
                        class="w-full h-full object-cover relative z-[1]">
                </div>
                <div class="flex-1 min-w-0">
                    <div class="flex items-center gap-3 mb-1">
                        <h3 class="font-bold text-surface-900 dark:text-white text-sm group-hover:text-brand-500 transition-colors truncate">{{ movie.title }}</h3>
                        <span class="text-xs text-surface-400 shrink-0">{{ movie.release_date | date:'yyyy' }}</span>
                        <span class="bg-brand-400 text-surface-900 text-[10px] font-bold px-2 py-0.5 rounded shrink-0">{{ movie.vote_average | number:'1.1-1' }}</span>
                    </div>
                    <p class="text-sm text-surface-500 dark:text-surface-400 line-clamp-1">{{ movie.overview }}</p>
                </div>
            </div>
        </div>

        <!-- Pagination -->
        <div class="flex justify-center items-center gap-4 mt-12">
            <button (click)="prevPage()" [disabled]="currentPage === 1"
                class="btn-secondary disabled:opacity-30 disabled:cursor-not-allowed">
                &larr; Previous
            </button>
            <span class="text-sm font-bold bg-brand-400 text-surface-900 px-4 py-2 rounded-full">Page {{ currentPage }}</span>
            <button (click)="nextPage()"
                class="btn-secondary">
                Next &rarr;
            </button>
        </div>
    </section>

</div>
