<div class="card max-w-md mx-auto mt-20 p-8">
  <h2 class="text-2xl font-black text-surface-900 dark:text-white mb-8 text-center">Sign In</h2>

  <div *ngIf="errorMsg" class="bg-red-50 dark:bg-red-500/10 text-accent-red border border-red-200 dark:border-red-500/20 p-3 rounded-xl mb-4 text-sm font-semibold">
    {{ errorMsg }}
  </div>

  <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="space-y-4">
    <div>
      <label class="block text-xs font-bold tracking-widest uppercase text-surface-400 mb-2">Username</label>
      <input type="text" formControlName="username" class="input-base w-full">
    </div>

    <div>
      <label class="block text-xs font-bold tracking-widest uppercase text-surface-400 mb-2">Password</label>
      <input type="password" formControlName="password" class="input-base w-full">
    </div>

    <button type="submit" [disabled]="loginForm.invalid"
      class="btn-primary w-full !rounded-full mt-6 disabled:opacity-50 disabled:cursor-not-allowed">
      Log In
    </button>
  </form>

  <p class="text-center mt-6 text-sm text-surface-500 dark:text-surface-400">
    Don't have an account?
    <a routerLink="/register" class="text-brand-500 hover:text-brand-600 font-bold transition-colors cursor-pointer">Create one</a>
  </p>
</div>
