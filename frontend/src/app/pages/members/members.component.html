<div class="max-w-6xl mx-auto pt-8 pb-20">
  <h1 class="text-3xl font-black text-gray-900 mb-2">Members</h1>
  <p class="text-gray-500 text-sm font-bold tracking-widest uppercase mb-12 border-b border-gray-200 pb-4">
    Découvrez la communauté
  </p>

  <div class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-6">
    <div 
      *ngFor="let user of users" 
      [routerLink]="['/profile', user.id]" 
      class="bg-white border border-gray-100 rounded-2xl p-6 shadow-sm flex flex-col items-center cursor-pointer hover:shadow-md hover:border-figma-yellow transition-all group">
      
      <div class="w-16 h-16 bg-gray-100 rounded-full flex items-center justify-center text-xl font-black text-gray-400 group-hover:bg-figma-yellow group-hover:text-black transition-colors mb-4">
        {{ user.username.charAt(0) | uppercase }}
      </div>
      
      <h3 class="text-sm font-bold text-gray-900 truncate w-full text-center">{{ user.username }}</h3>
    </div>
  </div>
</div>
