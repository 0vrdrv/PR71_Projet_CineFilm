<div class="pb-20">
  <h1 class="text-3xl font-black text-surface-900 dark:text-white mb-2">Members</h1>
  <p class="text-surface-400 text-sm font-bold tracking-widest uppercase mb-8 border-b border-surface-200 dark:border-surface-700 pb-4">
    Discover the community
  </p>

  <div class="mb-8">
    <input type="text" [formControl]="searchControl" placeholder="Search members..."
      class="input-base w-full md:w-80">
  </div>

  <div *ngIf="loading" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-6">
    <app-skeleton *ngFor="let i of [1,2,3,4,5,6]" type="avatar"></app-skeleton>
  </div>

  <div *ngIf="!loading" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-4">
    <div *ngFor="let user of filteredUsers" [routerLink]="['/profile', user.id]"
      class="card p-6 flex flex-col items-center cursor-pointer hover:border-brand-400 group">
      <div class="w-16 h-16 bg-surface-100 dark:bg-surface-800 rounded-full flex items-center justify-center text-xl font-black text-surface-400 group-hover:bg-brand-400 group-hover:text-surface-900 transition-colors mb-4">
        {{ user.username.charAt(0) | uppercase }}
      </div>
      <h3 class="text-sm font-bold text-surface-900 dark:text-white truncate w-full text-center">{{ user.username }}</h3>
    </div>
  </div>
</div>
