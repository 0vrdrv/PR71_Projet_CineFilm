<div class="max-w-md mx-auto mt-20 bg-figma-gray-light p-8 rounded-xl shadow-sm">
  <h2 class="text-2xl font-bold mb-6 text-center">Create Account</h2>
  
  <div *ngIf="errorMsg" class="bg-red-100 text-red-700 p-3 rounded mb-4 text-sm">
    {{ errorMsg }}
  </div>

  <form [formGroup]="registerForm" (ngSubmit)="onSubmit()" class="space-y-4">
    <div>
      <label class="block text-xs font-bold tracking-widest uppercase text-gray-500 mb-1">Username</label>
      <input type="text" formControlName="username" class="w-full px-4 py-2 rounded border border-gray-300 focus:outline-none focus:ring-2 focus:ring-figma-yellow">
    </div>

    <div>
      <label class="block text-xs font-bold tracking-widest uppercase text-gray-500 mb-1">Email</label>
      <input type="email" formControlName="email" class="w-full px-4 py-2 rounded border border-gray-300 focus:outline-none focus:ring-2 focus:ring-figma-yellow">
    </div>

    <div>
      <label class="block text-xs font-bold tracking-widest uppercase text-gray-500 mb-1">Password</label>
      <input type="password" formControlName="password" class="w-full px-4 py-2 rounded border border-gray-300 focus:outline-none focus:ring-2 focus:ring-figma-yellow">
    </div>

    <button type="submit" [disabled]="registerForm.invalid" class="w-full bg-figma-yellow text-black font-bold tracking-widest uppercase text-xs py-3 rounded-full hover:scale-105 transition-transform disabled:opacity-50 disabled:hover:scale-100 mt-4">
      Sign Up
    </button>
  </form>
</div>
